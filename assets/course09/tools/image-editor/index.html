<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>嘉義市婦女學苑專屬圖片編輯工具</title>
<link rel="icon" href="../../../favicon.svg" type="image/svg+xml">
<style>
:root{
  --pink-50:#fff5f8; --pink-100:#ffe4ee; --pink-200:#ffc9dd;
  --pink-300:#ff9cc0; --pink-400:#ff6fa5; --pink-500:#ff4d8d;
  --pink-600:#f02d72; --pink-700:#c91f5b;
  --ink:#3a2b33; --muted:#9b8791; --line:#ffd9e6;
  --white:#ffffff; --shadow:0 10px 40px rgba(255,77,141,.16);
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,-apple-system,sans-serif;
  background:linear-gradient(135deg,var(--pink-50) 0%,#fff 50%,var(--pink-100) 100%);
  background-attachment:fixed;color:var(--ink);min-height:100vh;line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1280px;margin:0 auto;padding:24px 18px 56px}

/* header / toolbar */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;
  flex-wrap:wrap;margin-bottom:20px}
.brand{display:flex;align-items:center;gap:12px}
.brand .badge{width:46px;height:46px;border-radius:14px;
  background:linear-gradient(135deg,var(--pink-400),var(--pink-600));
  display:grid;place-items:center;box-shadow:var(--shadow);flex:none}
.brand .badge svg{width:26px;height:26px}
.brand h1{font-size:1.4rem;font-weight:800;letter-spacing:-.4px;
  background:linear-gradient(135deg,var(--pink-500),var(--pink-700));
  -webkit-background-clip:text;background-clip:text;color:transparent;line-height:1.2}
.brand p{color:var(--muted);font-size:.82rem}
.actions{display:flex;gap:8px;flex-wrap:wrap}

.btn{border:none;border-radius:12px;min-height:44px;padding:10px 16px;font-size:.88rem;font-weight:700;
  cursor:pointer;transition:.18s;display:inline-flex;align-items:center;justify-content:center;
  gap:7px;font-family:inherit}
.btn svg{width:16px;height:16px}
.btn-primary{background:linear-gradient(135deg,var(--pink-400),var(--pink-600));color:#fff;
  box-shadow:0 6px 18px rgba(255,77,141,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(255,77,141,.4)}
.btn-ghost{background:#fff;color:var(--pink-600);border:1.5px solid var(--pink-300)}
.btn-ghost:hover{background:var(--pink-50)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* editor layout */
.editor{display:grid;grid-template-columns:72px 1fr 320px;gap:16px;align-items:start}
@media(max-width:960px){.editor{grid-template-columns:1fr}
  .rail{flex-direction:row;overflow-x:auto;position:static!important}
  .panel{position:static!important}}

.card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow)}

/* tool rail */
.rail{display:flex;flex-direction:column;gap:6px;padding:10px;position:sticky;top:18px}
.rail .tool{border:none;background:var(--pink-50);color:var(--pink-700);border-radius:13px;
  padding:10px 4px;cursor:pointer;font-size:.68rem;font-weight:600;transition:.16s;
  display:flex;flex-direction:column;align-items:center;gap:5px;flex:1 0 auto}
.rail .tool svg{width:22px;height:22px}
.rail .tool:hover{background:var(--pink-100)}
.rail .tool.active{background:linear-gradient(135deg,var(--pink-400),var(--pink-600));color:#fff;
  box-shadow:0 6px 16px rgba(255,77,141,.3)}

/* stage */
.stage-card{padding:16px;min-height:420px;display:flex;flex-direction:column}
.stage{flex:1;position:relative;background:
  linear-gradient(45deg,#fbe9f1 25%,transparent 25%),
  linear-gradient(-45deg,#fbe9f1 25%,transparent 25%),
  linear-gradient(45deg,transparent 75%,#fbe9f1 75%),
  linear-gradient(-45deg,transparent 75%,#fbe9f1 75%);
  background-size:22px 22px;background-position:0 0,0 11px,11px -11px,-11px 0;
  border-radius:14px;display:grid;place-items:center;overflow:hidden;min-height:380px;padding:14px}
#view{max-width:100%;max-height:70vh;border-radius:8px;box-shadow:0 4px 18px rgba(0,0,0,.12);
  display:none;touch-action:none}
.drop{text-align:center;color:var(--muted);padding:40px 20px;cursor:pointer;width:100%}
.drop.drag{color:var(--pink-600)}
.drop svg{width:64px;height:64px;opacity:.4;margin-bottom:12px}
.drop h3{color:var(--pink-700);font-size:1.05rem;margin-bottom:4px}
.drop .or{font-size:.8rem;margin-top:10px}
.drop .pick{display:inline-block;margin-top:12px;background:var(--pink-100);color:var(--pink-700);
  font-weight:700;padding:9px 18px;border-radius:11px;font-size:.85rem}

/* crop overlay */
#cropLayer{position:absolute;inset:0;display:none;cursor:crosshair}
.crop-box{position:absolute;border:2px solid #fff;box-shadow:0 0 0 9999px rgba(0,0,0,.45);cursor:move}
.crop-box .h{position:absolute;width:14px;height:14px;background:#fff;border:2px solid var(--pink-500);
  border-radius:50%}
.crop-box .h.tl{left:-7px;top:-7px;cursor:nwse-resize}
.crop-box .h.tr{right:-7px;top:-7px;cursor:nesw-resize}
.crop-box .h.bl{left:-7px;bottom:-7px;cursor:nesw-resize}
.crop-box .h.br{right:-7px;bottom:-7px;cursor:nwse-resize}
.crop-box .grid3{position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(#fff6 1px,transparent 1px) 0 33.3%/100% 33.3%,
  linear-gradient(90deg,#fff6 1px,transparent 1px) 33.3% 0/33.3% 100%;opacity:.5}

/* control panel */
.panel{padding:18px;position:sticky;top:18px;max-height:calc(100vh - 40px);overflow-y:auto}
.panel h2{font-size:.78rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--pink-600);
  font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.panel .reset-mini{min-width:44px;min-height:44px;padding:4px 6px;font-size:.72rem;color:var(--muted);background:none;border:none;cursor:pointer;
  text-transform:none;letter-spacing:0;text-decoration:underline;font-weight:600}
.pane{display:none}.pane.on{display:block}

.slider{margin-bottom:15px}
.slider .lab{display:flex;justify-content:space-between;font-size:.82rem;font-weight:600;margin-bottom:6px}
.slider .lab .val{color:var(--pink-600);font-variant-numeric:tabular-nums}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:5px;
  background:var(--pink-100);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink-400),var(--pink-600));cursor:pointer;border:2px solid #fff;
  box-shadow:0 2px 6px rgba(255,77,141,.4)}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;border:2px solid #fff;
  background:var(--pink-500);cursor:pointer}

.grid-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tile{border:1.5px solid var(--line);background:var(--pink-50);color:var(--pink-700);border-radius:12px;
  padding:11px 8px;font-size:.82rem;font-weight:600;cursor:pointer;transition:.15s;display:flex;
  align-items:center;justify-content:center;gap:7px}
.tile svg{width:17px;height:17px}
.tile:hover{background:var(--pink-100);border-color:var(--pink-300)}
.tile.active{background:linear-gradient(135deg,var(--pink-400),var(--pink-600));color:#fff;border-color:transparent}

/* filter thumbnails */
.filters{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fthumb{cursor:pointer;text-align:center}
.fthumb canvas{width:100%;aspect-ratio:1;border-radius:11px;border:2px solid transparent;
  object-fit:cover;display:block;background:var(--pink-50)}
.fthumb.active canvas{border-color:var(--pink-500)}
.fthumb span{font-size:.72rem;color:var(--muted);display:block;margin-top:4px;font-weight:600}
.fthumb.active span{color:var(--pink-600)}

.field{margin-bottom:13px}
.field label{display:block;font-size:.8rem;font-weight:600;margin-bottom:5px}
.field input[type=text],.field input[type=number],.field select{width:100%;border:1.5px solid var(--line);
  border-radius:11px;padding:9px 12px;font-size:.9rem;font-family:inherit;color:var(--ink);
  background:var(--pink-50);outline:none}
.field input:focus,.field select:focus{border-color:var(--pink-400);background:#fff}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.inline{display:flex;align-items:center;gap:10px}
.inline input[type=color]{width:42px;height:36px;border:1.5px solid var(--line);border-radius:10px;
  padding:2px;cursor:pointer;background:#fff}
.chk{display:flex;align-items:center;gap:8px;font-size:.85rem;font-weight:600;cursor:pointer;margin-bottom:12px}
.chk input{width:16px;height:16px;accent-color:var(--pink-500)}
.apply-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.hint{font-size:.74rem;color:var(--muted);margin-top:6px;line-height:1.4}
.textlist{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.textlist .item{display:flex;align-items:center;gap:8px;background:var(--pink-50);border:1.5px solid var(--line);
  border-radius:10px;padding:7px 10px;font-size:.8rem}
.textlist .item span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.textlist .item button{background:none;border:none;color:var(--pink-600);cursor:pointer;font-weight:700}
.aspect-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
footer{text-align:center;color:var(--muted);font-size:.78rem;margin-top:30px}
.disabled-veil{opacity:.45;pointer-events:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <span class="badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2.5"/><circle cx="8.5" cy="8.5" r="1.6"/>
          <path d="M21 15l-5-5L5 21"/></svg>
      </span>
      <div>
        <h1>嘉義市婦女學苑專屬圖片編輯工具</h1>
        <p>調整、濾鏡、裁切、文字 · 完全離線 · 不上傳任何圖片</p>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-ghost" id="btnUndo" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 7v6h6M3 13a9 9 0 1 0 3-7.7L3 8"/></svg>復原</button>
      <button class="btn btn-ghost" id="btnReset" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-9-9c2.5 0 4.7 1 6.3 2.7L21 8"/><path d="M21 3v5h-5"/></svg>重設</button>
      <button class="btn btn-ghost" id="btnOpen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 5h6l2 2h8v12H4z"/></svg>開啟</button>
      <button class="btn btn-primary" id="btnPng" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>PNG</button>
      <button class="btn btn-primary" id="btnJpg" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>JPG</button>
    </div>
  </div>

  <div class="editor">
    <!-- tool rail -->
    <div class="card rail" id="rail"></div>

    <!-- stage -->
    <div class="card stage-card">
      <div class="stage" id="stage">
        <canvas id="view"></canvas>
        <div id="cropLayer"></div>
        <div class="drop" id="drop">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2.5"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="M21 15l-5-5L5 21"/></svg>
          <h3>拖放圖片到這裡</h3>
          <div>或點擊選擇檔案 · 也可直接貼上 (Ctrl/⌘+V)</div>
          <span class="pick">選擇圖片</span>
        </div>
      </div>
    </div>

    <!-- control panel -->
    <div class="card panel" id="panel">
      <!-- ADJUST -->
      <div class="pane on" data-pane="adjust">
        <h2>調整 <button class="reset-mini" data-reset="adjust">重設</button></h2>
        <div id="adjSliders"></div>
      </div>
      <!-- FILTERS -->
      <div class="pane" data-pane="filters">
        <h2>濾鏡</h2>
        <div class="filters" id="filterGrid"></div>
      </div>
      <!-- TRANSFORM -->
      <div class="pane" data-pane="transform">
        <h2>旋轉與翻轉</h2>
        <div class="grid-btns" style="margin-bottom:12px">
          <button class="tile" data-act="rotL"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 7v6h6"/><path d="M3 13a9 9 0 1 0 3-7.7L3 8"/></svg>左轉 90°</button>
          <button class="tile" data-act="rotR"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 7v6h-6"/><path d="M21 13a9 9 0 1 1-3-7.7L21 8"/></svg>右轉 90°</button>
          <button class="tile" data-act="flipH"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 3v18M7 8l-4 4 4 4M17 8l4 4-4 4"/></svg>水平翻轉</button>
          <button class="tile" data-act="flipV"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M8 7L12 3l4 4M8 17l4 4 4-4"/></svg>垂直翻轉</button>
        </div>
        <div class="slider">
          <div class="lab"><span>水平校正</span><span class="val" id="straightVal">0°</span></div>
          <input type="range" id="straighten" min="-45" max="45" value="0">
        </div>
        <p class="hint">校正會自動放大以填滿邊角。按「套用」可固定目前角度。</p>
        <div class="apply-row">
          <button class="btn btn-ghost" data-act="straightReset">歸零</button>
          <button class="btn btn-primary" data-act="straightApply">套用</button>
        </div>
      </div>
      <!-- CROP -->
      <div class="pane" data-pane="crop">
        <h2>裁切</h2>
        <div class="aspect-grid" id="aspectGrid"></div>
        <p class="hint">拖動方框與四角調整範圍。</p>
        <div class="apply-row">
          <button class="btn btn-ghost" data-act="cropCancel">取消</button>
          <button class="btn btn-primary" data-act="cropApply">套用裁切</button>
        </div>
      </div>
      <!-- RESIZE -->
      <div class="pane" data-pane="resize">
        <h2>尺寸調整</h2>
        <div class="row2">
          <div class="field"><label>寬度 (px)</label><input type="number" id="rw" min="1"></div>
          <div class="field"><label>高度 (px)</label><input type="number" id="rh" min="1"></div>
        </div>
        <label class="chk"><input type="checkbox" id="rlock" checked>鎖定長寬比</label>
        <p class="hint" id="origSize"></p>
        <div class="apply-row">
          <button class="btn btn-ghost" data-act="resizeReset">還原原始</button>
          <button class="btn btn-primary" data-act="resizeApply">套用尺寸</button>
        </div>
      </div>
      <!-- TEXT -->
      <div class="pane" data-pane="text">
        <h2>文字</h2>
        <div class="field"><label>文字內容</label><input type="text" id="txtVal" placeholder="輸入文字"></div>
        <div class="row2">
          <div class="field"><label>字級</label><input type="number" id="txtSize" value="48" min="6"></div>
          <div class="field"><label>字體</label>
            <select id="txtFont">
              <option value='"Noto Sans TC",sans-serif'>黑體</option>
              <option value='"Noto Serif TC",serif'>明體</option>
              <option value='Georgia,serif'>Georgia</option>
              <option value='Impact,sans-serif'>Impact</option>
              <option value='"Courier New",monospace'>等寬</option>
            </select>
          </div>
        </div>
        <div class="field"><label>顏色與樣式</label>
          <div class="inline">
            <input type="color" id="txtColor" value="#ffffff">
            <label class="chk" style="margin:0"><input type="checkbox" id="txtBold" checked>粗體</label>
            <label class="chk" style="margin:0"><input type="checkbox" id="txtShadow" checked>陰影</label>
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%" data-act="addText">＋ 加入文字</button>
        <p class="hint">在畫布上拖動文字即可移動位置。</p>
        <div class="textlist" id="textList"></div>
      </div>
    </div>
  </div>

  <footer>所有影像處理皆在您的瀏覽器本機完成，圖片不會上傳到任何伺服器。</footer>
</div>

<input type="file" id="fileInput" accept="image/*" hidden>

<script>
(function(){
"use strict";
var $=function(s){return document.querySelector(s);};
var $$=function(s){return Array.prototype.slice.call(document.querySelectorAll(s));};

/* ---------- state ---------- */
var DEF={brightness:100,contrast:100,saturate:100,hue:0,blur:0,grayscale:0,sepia:0,invert:0,
         temp:0,tint:0,sharpen:0,vignette:0,rotate:0};
var adj=Object.assign({},DEF);
var work=null;            // working HTMLImageElement/Canvas (the base bitmap)
var texts=[];             // {text,x,y,size,font,color,bold,shadow}
var history=[];           // snapshots for undo (destructive ops)
var activeTextId=null, textSeq=0;
var crop=null;            // {x,y,w,h} in image fraction when crop pane active
var cropAspect=0;         // 0 = free
var MAXDIM=2600;          // cap working dimension for performance

var view=$("#view"), vctx=view.getContext("2d");
var base=document.createElement("canvas"), bctx=base.getContext("2d");

/* ---------- tools ---------- */
var TOOLS=[
  {id:"adjust",name:"調整",icon:'<circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18"/>'},
  {id:"filters",name:"濾鏡",icon:'<path d="M12 3l9 16H3z"/><circle cx="12" cy="14" r="2"/>'},
  {id:"transform",name:"旋轉",icon:'<path d="M21 7v6h-6"/><path d="M21 13a9 9 0 1 1-3-7.7L21 8"/>'},
  {id:"crop",name:"裁切",icon:'<path d="M6 2v16h16M2 6h16v16"/>'},
  {id:"resize",name:"尺寸",icon:'<path d="M3 3h7v7M21 21h-7v-7M21 3l-8 8M3 21l8-8"/>'},
  {id:"text",name:"文字",icon:'<path d="M4 7V4h16v3M9 20h6M12 4v16"/>'}
];
var rail=$("#rail"), activeTool="adjust";
TOOLS.forEach(function(t){
  var b=document.createElement("button");
  b.className="tool"+(t.id===activeTool?" active":""); b.dataset.id=t.id;
  b.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+t.icon+'</svg><span>'+t.name+'</span>';
  b.onclick=function(){ selectTool(t.id); };
  rail.appendChild(b);
});
function selectTool(id){
  if(id==="crop" && work) startCrop(); else endCrop();
  activeTool=id;
  $$(".rail .tool").forEach(function(x){x.classList.toggle("active",x.dataset.id===id);});
  $$(".pane").forEach(function(p){p.classList.toggle("on",p.dataset.pane===id);});
  if(id==="resize"&&work){ $("#rw").value=work.width; $("#rh").value=work.height;
    $("#origSize").textContent="原始尺寸："+work.width+" × "+work.height+" px"; }
}

/* ---------- adjust sliders ---------- */
var ADJ=[
  {k:"brightness",n:"亮度",min:0,max:200,suf:"%"},
  {k:"contrast",n:"對比",min:0,max:200,suf:"%"},
  {k:"saturate",n:"飽和度",min:0,max:200,suf:"%"},
  {k:"temp",n:"色溫",min:-100,max:100,suf:""},
  {k:"tint",n:"色調",min:-100,max:100,suf:""},
  {k:"hue",n:"色相",min:0,max:360,suf:"°"},
  {k:"sharpen",n:"銳化",min:0,max:100,suf:"%"},
  {k:"blur",n:"模糊",min:0,max:20,suf:"px"},
  {k:"vignette",n:"暈影",min:0,max:100,suf:"%"},
  {k:"grayscale",n:"黑白",min:0,max:100,suf:"%"},
  {k:"sepia",n:"懷舊",min:0,max:100,suf:"%"},
  {k:"invert",n:"負片",min:0,max:100,suf:"%"}
];
var as=$("#adjSliders");
ADJ.forEach(function(a){
  var d=document.createElement("div"); d.className="slider";
  d.innerHTML='<div class="lab"><span>'+a.n+'</span><span class="val" id="v_'+a.k+'">'+adj[a.k]+a.suf+'</span></div>'+
    '<input type="range" id="s_'+a.k+'" min="'+a.min+'" max="'+a.max+'" value="'+adj[a.k]+'">';
  as.appendChild(d);
  var inp=d.querySelector("input");
  inp.addEventListener("input",function(){
    adj[a.k]=parseFloat(inp.value); $("#v_"+a.k).textContent=inp.value+a.suf; scheduleRender();
  });
});
function syncAdjUI(){
  ADJ.forEach(function(a){ var s=$("#s_"+a.k); if(s){s.value=adj[a.k]; $("#v_"+a.k).textContent=adj[a.k]+a.suf;} });
  $("#straighten").value=adj.rotate; $("#straightVal").textContent=adj.rotate+"°";
}

/* ---------- filter presets ---------- */
var PRESETS=[
  {id:"none",n:"原圖",a:{}},
  {id:"vivid",n:"鮮豔",a:{saturate:150,contrast:115,brightness:104}},
  {id:"mono",n:"黑白",a:{grayscale:100,contrast:110}},
  {id:"warm",n:"暖陽",a:{temp:45,saturate:115,brightness:104}},
  {id:"cool",n:"清冷",a:{temp:-45,saturate:108,contrast:105}},
  {id:"vintage",n:"復古",a:{sepia:45,saturate:85,contrast:95,temp:20,vignette:35}},
  {id:"fade",n:"淡雅",a:{contrast:88,saturate:80,brightness:108}},
  {id:"drama",n:"戲劇",a:{contrast:140,saturate:120,sharpen:30,vignette:30}},
  {id:"film",n:"底片",a:{sepia:20,contrast:108,saturate:110,grayscale:8,vignette:25}}
];
function applyPreset(p){
  adj=Object.assign({},DEF,p.a);
  syncAdjUI(); render();
  $$(".fthumb").forEach(function(x){x.classList.toggle("active",x.dataset.id===p.id);});
}

/* ---------- crop aspect buttons ---------- */
var ASPECTS=[{n:"自由",v:0},{n:"1:1",v:1},{n:"4:3",v:4/3},{n:"3:4",v:3/4},{n:"16:9",v:16/9},{n:"3:2",v:3/2}];
var ag=$("#aspectGrid");
ASPECTS.forEach(function(a,i){
  var b=document.createElement("button"); b.className="tile"+(i===0?" active":""); b.textContent=a.n;
  b.onclick=function(){ cropAspect=a.v; $$("#aspectGrid .tile").forEach(function(x){x.classList.remove("active");});
    b.classList.add("active"); applyAspect(); };
  ag.appendChild(b);
});

/* ---------- file loading ---------- */
var fileInput=$("#fileInput"), drop=$("#drop"), stage=$("#stage");
function openImage(file){
  if(!file||!/^image\//.test(file.type))return;
  var r=new FileReader();
  r.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var c=document.createElement("canvas"), w=img.width, h=img.height;
      if(Math.max(w,h)>MAXDIM){ var s=MAXDIM/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
      c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h);
      work=c; adj=Object.assign({},DEF); texts=[]; history=[]; activeTextId=null;
      drop.style.display="none"; view.style.display="block";
      enable(true); syncAdjUI(); renderTextList(); buildThumbs(); render();
      $("#btnUndo").disabled=true;
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}
$("#btnOpen").onclick=function(){fileInput.click();};
drop.onclick=function(){fileInput.click();};
fileInput.onchange=function(e){ if(e.target.files[0]) openImage(e.target.files[0]); };
["dragenter","dragover"].forEach(function(ev){stage.addEventListener(ev,function(e){e.preventDefault();drop.classList.add("drag");});});
["dragleave","drop"].forEach(function(ev){stage.addEventListener(ev,function(e){e.preventDefault();drop.classList.remove("drag");});});
stage.addEventListener("drop",function(e){ if(e.dataTransfer.files[0]) openImage(e.dataTransfer.files[0]); });
window.addEventListener("paste",function(e){
  var items=e.clipboardData&&e.clipboardData.items; if(!items)return;
  for(var i=0;i<items.length;i++){ if(items[i].type.indexOf("image")===0){ openImage(items[i].getAsFile()); break; } }
});

function enable(on){
  ["#btnPng","#btnJpg","#btnReset"].forEach(function(s){$(s).disabled=!on;});
}

/* ---------- render pipeline ---------- */
var rafPending=false;
function scheduleRender(){ if(rafPending)return; rafPending=true;
  requestAnimationFrame(function(){rafPending=false; render();}); }

function cssFilter(){
  return "brightness("+adj.brightness+"%) contrast("+adj.contrast+"%) saturate("+adj.saturate+"%)"+
    " hue-rotate("+adj.hue+"deg) blur("+adj.blur+"px) grayscale("+adj.grayscale+"%)"+
    " sepia("+adj.sepia+"%) invert("+adj.invert+"%)";
}
function zoomForRotation(w,h,deg){
  if(!deg)return 1; var r=Math.abs(deg)*Math.PI/180, c=Math.abs(Math.cos(r)), s=Math.abs(Math.sin(r));
  return Math.max((w*c+h*s)/w,(w*s+h*c)/h);
}
function render(){
  if(!work)return;
  var w=work.width, h=work.height;
  base.width=w; base.height=h;
  bctx.clearRect(0,0,w,h);
  bctx.save();
  bctx.filter=cssFilter();
  if(adj.rotate){
    bctx.translate(w/2,h/2); bctx.rotate(adj.rotate*Math.PI/180);
    var z=zoomForRotation(w,h,adj.rotate); bctx.scale(z,z);
    bctx.drawImage(work,-w/2,-h/2);
  } else { bctx.drawImage(work,0,0); }
  bctx.restore(); bctx.filter="none";
  // pixel pass
  if(adj.temp||adj.tint||adj.sharpen){
    var id=bctx.getImageData(0,0,w,h);
    if(adj.temp||adj.tint) tempTint(id,adj.temp,adj.tint);
    if(adj.sharpen) id=sharpen(id,adj.sharpen/100);
    bctx.putImageData(id,0,0);
  }
  if(adj.vignette) vignette(bctx,w,h,adj.vignette/100);
  texts.forEach(function(t){drawText(bctx,t,w,h);});
  // blit to view
  view.width=w; view.height=h;
  vctx.clearRect(0,0,w,h); vctx.drawImage(base,0,0);
}

function tempTint(id,temp,tint){
  var d=id.data, rt=temp*0.6, bt=-temp*0.6, gt=-tint*0.5;
  for(var i=0;i<d.length;i+=4){
    d[i]=clamp(d[i]+rt); d[i+1]=clamp(d[i+1]+gt); d[i+2]=clamp(d[i+2]+bt);
  }
}
function clamp(v){return v<0?0:v>255?255:v;}
function sharpen(id,amt){
  var w=id.width,h=id.height,src=id.data,out=new Uint8ClampedArray(src);
  var c=1+4*amt, e=-amt; // kernel center & edges
  for(var y=1;y<h-1;y++)for(var x=1;x<w-1;x++){
    var o=(y*w+x)*4;
    for(var ch=0;ch<3;ch++){
      var v=src[o+ch]*c+src[o-4+ch]*e+src[o+4+ch]*e+src[o-w*4+ch]*e+src[o+w*4+ch]*e;
      out[o+ch]=v<0?0:v>255?255:v;
    }
  }
  return new ImageData(out,w,h);
}
function vignette(ctx,w,h,amt){
  var g=ctx.createRadialGradient(w/2,h/2,Math.min(w,h)*0.3,w/2,h/2,Math.max(w,h)*0.72);
  g.addColorStop(0,"rgba(0,0,0,0)"); g.addColorStop(1,"rgba(0,0,0,"+(amt*0.85)+")");
  ctx.save(); ctx.fillStyle=g; ctx.fillRect(0,0,w,h); ctx.restore();
}
function drawText(ctx,t,w,h){
  ctx.save();
  ctx.font=(t.bold?"bold ":"")+t.size+"px "+t.font;
  ctx.textBaseline="middle"; ctx.textAlign="center";
  ctx.fillStyle=t.color;
  if(t.shadow){ ctx.shadowColor="rgba(0,0,0,.55)"; ctx.shadowBlur=t.size*0.12; ctx.shadowOffsetY=t.size*0.05; }
  ctx.fillText(t.text,t.x*w,t.y*h);
  ctx.restore();
}

/* ---------- thumbnails for filters ---------- */
function buildThumbs(){
  var grid=$("#filterGrid"); grid.innerHTML="";
  // small source
  var tw=120, th=120, sc=Math.min(tw/work.width,th/work.height);
  var sw=Math.round(work.width*sc), sh=Math.round(work.height*sc);
  var src=document.createElement("canvas"); src.width=sw; src.height=sh;
  src.getContext("2d").drawImage(work,0,0,sw,sh);
  PRESETS.forEach(function(p){
    var d=document.createElement("div"); d.className="fthumb"+(p.id==="none"?" active":""); d.dataset.id=p.id;
    var cv=document.createElement("canvas"); cv.width=sw; cv.height=sh;
    var cx=cv.getContext("2d"); var a=Object.assign({},DEF,p.a);
    cx.filter="brightness("+a.brightness+"%) contrast("+a.contrast+"%) saturate("+a.saturate+"%) sepia("+a.sepia+"%) grayscale("+a.grayscale+"%)";
    cx.drawImage(src,0,0); cx.filter="none";
    if(a.temp){ var idd=cx.getImageData(0,0,sw,sh); tempTint(idd,a.temp,0); cx.putImageData(idd,0,0); }
    if(a.vignette) vignette(cx,sw,sh,a.vignette/100);
    var span=document.createElement("span"); span.textContent=p.n;
    d.appendChild(cv); d.appendChild(span);
    d.onclick=function(){ applyPreset(p); };
    grid.appendChild(d);
  });
}

/* ---------- destructive ops ---------- */
function snapshot(){
  if(!work)return;
  history.push({src:work.toDataURL?work.toDataURL():null,
                w:work.width,h:work.height,adj:Object.assign({},adj),texts:JSON.parse(JSON.stringify(texts))});
  if(history.length>20)history.shift();
  $("#btnUndo").disabled=false;
}
function flattenToWork(newW,newH,drawFn){
  // bake current render + geometric op into new working canvas
  render();
  var c=document.createElement("canvas"); c.width=newW; c.height=newH;
  drawFn(c.getContext("2d"));
  work=c; adj=Object.assign({},DEF); texts=[]; activeTextId=null;
  syncAdjUI(); renderTextList(); buildThumbs(); render();
}
function rotate90(dir){
  snapshot();
  var w=base.width,h=base.height;
  flattenToWork(h,w,function(ctx){
    ctx.translate(h/2,w/2); ctx.rotate(dir*Math.PI/2); ctx.drawImage(base,-w/2,-h/2);
  });
}
function flip(h){
  snapshot();
  var w=base.width,hh=base.height;
  flattenToWork(w,hh,function(ctx){
    if(h){ctx.translate(w,0);ctx.scale(-1,1);} else {ctx.translate(0,hh);ctx.scale(1,-1);}
    ctx.drawImage(base,0,0);
  });
}

/* ---------- transform pane ---------- */
$("#straighten").addEventListener("input",function(){
  adj.rotate=parseFloat(this.value); $("#straightVal").textContent=this.value+"°"; scheduleRender();
});
$("#panel").addEventListener("click",function(e){
  var b=e.target.closest("[data-act]"); if(!b||!work)return;
  var a=b.dataset.act;
  if(a==="rotL")rotate90(-1);
  else if(a==="rotR")rotate90(1);
  else if(a==="flipH")flip(true);
  else if(a==="flipV")flip(false);
  else if(a==="straightReset"){adj.rotate=0;syncAdjUI();render();}
  else if(a==="straightApply"){ if(adj.rotate){ snapshot(); flattenToWork(base.width,base.height,function(ctx){ctx.drawImage(base,0,0);}); } }
  else if(a==="cropApply")applyCrop();
  else if(a==="cropCancel"){selectTool("adjust");}
  else if(a==="resizeApply")doResize();
  else if(a==="resizeReset"){$("#rw").value=work.width;$("#rh").value=work.height;}
  else if(a==="addText")addText();
});
$("#panel").addEventListener("click",function(e){
  var r=e.target.closest("[data-reset]"); if(r){ adj=Object.assign({},DEF,{rotate:adj.rotate}); syncAdjUI(); render();
    $$(".fthumb").forEach(function(x){x.classList.toggle("active",x.dataset.id==="none");}); }
});

/* ---------- resize ---------- */
$("#rw").addEventListener("input",function(){ if($("#rlock").checked&&work){ var r=work.height/work.width;
  $("#rh").value=Math.max(1,Math.round(this.value*r)); }});
$("#rh").addEventListener("input",function(){ if($("#rlock").checked&&work){ var r=work.width/work.height;
  $("#rw").value=Math.max(1,Math.round(this.value*r)); }});
function doResize(){
  var nw=parseInt($("#rw").value,10), nh=parseInt($("#rh").value,10);
  if(!nw||!nh||nw<1||nh<1)return;
  snapshot();
  flattenToWork(nw,nh,function(ctx){ ctx.imageSmoothingQuality="high"; ctx.drawImage(base,0,0,nw,nh); });
  $("#rw").value=nw; $("#rh").value=nh;
  $("#origSize").textContent="原始尺寸："+nw+" × "+nh+" px";
}

/* ---------- text ---------- */
function addText(){
  var v=$("#txtVal").value.trim(); if(!v)return;
  var t={id:++textSeq,text:v,x:0.5,y:0.5,size:parseInt($("#txtSize").value,10)||48,
    font:$("#txtFont").value,color:$("#txtColor").value,bold:$("#txtBold").checked,shadow:$("#txtShadow").checked};
  texts.push(t); activeTextId=t.id; $("#txtVal").value=""; renderTextList(); render();
}
function renderTextList(){
  var el=$("#textList"); el.innerHTML="";
  texts.forEach(function(t){
    var d=document.createElement("div"); d.className="item";
    d.innerHTML='<span>'+escapeHtml(t.text)+'</span>';
    var del=document.createElement("button"); del.textContent="刪除";
    del.onclick=function(){ texts=texts.filter(function(x){return x.id!==t.id;}); renderTextList(); render(); };
    d.appendChild(del); el.appendChild(d);
  });
}
function escapeHtml(s){return s.replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

/* text dragging on view */
var dragText=null;
function viewPos(e){ var r=view.getBoundingClientRect();
  var cx=(e.touches?e.touches[0].clientX:e.clientX), cy=(e.touches?e.touches[0].clientY:e.clientY);
  return {x:(cx-r.left)/r.width, y:(cy-r.top)/r.height}; }
view.addEventListener("pointerdown",function(e){
  if(activeTool!=="text"||!texts.length)return;
  var p=viewPos(e), w=work.width,h=work.height; bctx.save();
  // hit test from topmost
  for(var i=texts.length-1;i>=0;i--){ var t=texts[i];
    bctx.font=(t.bold?"bold ":"")+t.size+"px "+t.font;
    var tw=bctx.measureText(t.text).width/w, thh=t.size*1.2/h;
    if(Math.abs(p.x-t.x)<tw/2+0.02 && Math.abs(p.y-t.y)<thh/2+0.02){ dragText=t; view.setPointerCapture(e.pointerId); break; } }
  bctx.restore();
});
view.addEventListener("pointermove",function(e){ if(!dragText)return; var p=viewPos(e);
  dragText.x=Math.min(1,Math.max(0,p.x)); dragText.y=Math.min(1,Math.max(0,p.y)); scheduleRender(); });
view.addEventListener("pointerup",function(){ dragText=null; });

/* ---------- crop ---------- */
var cropLayer=$("#cropLayer"), cropBox=null;
function startCrop(){
  if(!work)return;
  cropLayer.style.display="block"; cropLayer.innerHTML="";
  crop={x:0.1,y:0.1,w:0.8,h:0.8};
  cropBox=document.createElement("div"); cropBox.className="crop-box";
  cropBox.innerHTML='<div class="grid3"></div><div class="h tl"></div><div class="h tr"></div><div class="h bl"></div><div class="h br"></div>';
  cropLayer.appendChild(cropBox);
  positionCrop(); attachCropDrag();
  window.addEventListener("resize",positionCrop);
}
function endCrop(){ cropLayer.style.display="none"; cropLayer.innerHTML=""; cropBox=null;
  window.removeEventListener("resize",positionCrop); }
function viewRectInStage(){
  var vr=view.getBoundingClientRect(), sr=cropLayer.getBoundingClientRect();
  return {left:vr.left-sr.left,top:vr.top-sr.top,width:vr.width,height:vr.height};
}
function positionCrop(){
  if(!cropBox)return; var R=viewRectInStage();
  cropBox.style.left=(R.left+crop.x*R.width)+"px";
  cropBox.style.top=(R.top+crop.y*R.height)+"px";
  cropBox.style.width=(crop.w*R.width)+"px";
  cropBox.style.height=(crop.h*R.height)+"px";
}
function applyAspect(){
  if(!crop)return;
  if(cropAspect){ var R=viewRectInStage(), boxW=crop.w, boxH=boxW*R.width/cropAspect/R.height;
    if(crop.y+boxH>1){boxH=1-crop.y;} crop.h=boxH; }
  positionCrop();
}
function attachCropDrag(){
  var mode=null, start=null;
  function down(e,m){ e.preventDefault(); mode=m; var p=e.touches?e.touches[0]:e;
    start={mx:p.clientX,my:p.clientY,c:Object.assign({},crop)}; document.addEventListener("pointermove",move);
    document.addEventListener("pointerup",up); }
  function move(e){ if(!mode)return; var R=viewRectInStage();
    var dx=(e.clientX-start.mx)/R.width, dy=(e.clientY-start.my)/R.height; var c=Object.assign({},start.c);
    if(mode==="move"){ c.x=clamp01(start.c.x+dx,start.c.w); c.y=clamp01(start.c.y+dy,start.c.h); }
    else { // resize corners
      if(mode.indexOf("l")>=0){ var nx=start.c.x+dx; c.x=Math.min(nx,start.c.x+start.c.w-0.05); c.w=start.c.x+start.c.w-c.x; }
      if(mode.indexOf("r")>=0){ c.w=Math.max(0.05,start.c.w+dx); if(c.x+c.w>1)c.w=1-c.x; }
      if(mode.indexOf("t")>=0){ var ny=start.c.y+dy; c.y=Math.min(ny,start.c.y+start.c.h-0.05); c.h=start.c.y+start.c.h-c.y; }
      if(mode.indexOf("b")>=0){ c.h=Math.max(0.05,start.c.h+dy); if(c.y+c.h>1)c.h=1-c.y; }
      if(cropAspect){ var R2=viewRectInStage(); c.h=(c.w*R2.width/cropAspect)/R2.height; if(c.y+c.h>1)c.h=1-c.y; }
    }
    crop=c; positionCrop();
  }
  function up(){ mode=null; document.removeEventListener("pointermove",move); document.removeEventListener("pointerup",up); }
  function clamp01(v,size){ return Math.min(Math.max(0,v),1-size); }
  cropBox.addEventListener("pointerdown",function(e){ if(e.target===cropBox||e.target.classList.contains("grid3"))down(e,"move"); });
  ["tl","tr","bl","br"].forEach(function(h){
    cropBox.querySelector(".h."+h).addEventListener("pointerdown",function(e){
      down(e,(h[0]==="t"?"t":"b")+(h[1]==="l"?"l":"r")); });
  });
}
function applyCrop(){
  if(!crop||!work)return;
  snapshot();
  var w=base.width,h=base.height;
  var cx=Math.round(crop.x*w), cy=Math.round(crop.y*h), cw=Math.round(crop.w*w), ch=Math.round(crop.h*h);
  cw=Math.max(1,cw); ch=Math.max(1,ch);
  render();
  var c=document.createElement("canvas"); c.width=cw; c.height=ch;
  c.getContext("2d").drawImage(base,cx,cy,cw,ch,0,0,cw,ch);
  work=c; adj=Object.assign({},DEF); texts=[]; activeTextId=null;
  syncAdjUI(); renderTextList(); buildThumbs();
  endCrop(); selectTool("adjust"); render();
}

/* ---------- undo / reset ---------- */
$("#btnUndo").onclick=function(){
  if(!history.length)return;
  var s=history.pop();
  var img=new Image();
  img.onload=function(){ var c=document.createElement("canvas"); c.width=s.w; c.height=s.h;
    c.getContext("2d").drawImage(img,0,0); work=c; adj=Object.assign({},s.adj); texts=JSON.parse(JSON.stringify(s.texts));
    syncAdjUI(); renderTextList(); buildThumbs(); render();
    $("#btnUndo").disabled=history.length===0; };
  img.src=s.src;
};
$("#btnReset").onclick=function(){
  adj=Object.assign({},DEF); texts=[]; activeTextId=null; syncAdjUI(); renderTextList(); render();
  $$(".fthumb").forEach(function(x){x.classList.toggle("active",x.dataset.id==="none");});
};

/* ---------- export ---------- */
function exportImg(type,q){
  if(!work)return; endCrop(); render();
  var url=base.toDataURL(type,q);
  var a=document.createElement("a"); a.href=url;
  a.download="edited."+(type==="image/jpeg"?"jpg":"png"); a.click();
}
$("#btnPng").onclick=function(){ exportImg("image/png"); };
$("#btnJpg").onclick=function(){ exportImg("image/jpeg",0.92); };

})();
</script>
