<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
  <title id="title">Local tool workflow visual</title>
  <desc id="desc">A local workflow tool interface with QR code, folder boundary and safety check.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#101820" flood-opacity=".15"/>
    </filter>
    <style>
      .scan { animation: scan 3.2s ease-in-out infinite; }
      .flow { stroke-dasharray: 10 16; animation: flow 6.5s linear infinite; }
      @keyframes scan { 50% { transform: translateY(140px); } }
      @keyframes flow { to { stroke-dashoffset: -160; } }
    </style>
  </defs>
  <rect width="1100" height="760" rx="42" fill="#f9f8f3"/>
  <g filter="url(#shadow)">
    <rect x="116" y="96" width="868" height="568" rx="36" fill="#fff"/>
    <rect x="154" y="138" width="330" height="484" rx="28" fill="#18222b"/>
    <text x="196" y="202" fill="#fff" font-size="30" font-family="Arial, 'Noto Sans TC', sans-serif" font-weight="800">Local Tool</text>
    <rect x="204" y="270" width="230" height="230" rx="22" fill="#fff"/>
    <g fill="#18222b">
      <rect x="236" y="302" width="34" height="34"/>
      <rect x="302" y="302" width="34" height="34"/>
      <rect x="368" y="302" width="34" height="34"/>
      <rect x="236" y="368" width="34" height="34"/>
      <rect x="302" y="368" width="34" height="34"/>
      <rect x="368" y="434" width="34" height="34"/>
      <rect x="236" y="434" width="34" height="34"/>
      <rect x="302" y="434" width="34" height="34"/>
    </g>
    <rect class="scan" x="214" y="300" width="210" height="7" rx="3.5" fill="#20b5ad" opacity=".8"/>
    <rect x="570" y="166" width="326" height="112" rx="26" fill="#eef3f1"/>
    <text x="610" y="232" fill="#18222b" font-size="28" font-family="Arial, 'Noto Sans TC', sans-serif" font-weight="800">限制資料夾</text>
    <rect x="570" y="326" width="326" height="112" rx="26" fill="#f7f3eb"/>
    <text x="610" y="392" fill="#18222b" font-size="28" font-family="Arial, 'Noto Sans TC', sans-serif" font-weight="800">本機執行</text>
    <rect x="570" y="486" width="326" height="112" rx="26" fill="#e3f3f0"/>
    <text x="610" y="552" fill="#18222b" font-size="28" font-family="Arial, 'Noto Sans TC', sans-serif" font-weight="800">人工檢查</text>
    <path class="flow" d="M484 384H536c28 0 26-150 26-162M484 384H562M484 384H536c28 0 26 150 26 162" fill="none" stroke="#db5b48" stroke-width="7" stroke-linecap="round"/>
  </g>
</svg>
