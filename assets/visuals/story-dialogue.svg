<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
  <title id="title">AI dialogue visual</title>
  <desc id="desc">A polished abstract interface showing prompts becoming structured answers.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#101820" flood-opacity=".14"/>
    </filter>
    <style>
      .rise { animation: rise 6s ease-in-out infinite; }
      .rise2 { animation: rise 6s ease-in-out infinite; animation-delay: -1.8s; }
      .draw { stroke-dasharray: 14 14; animation: draw 7s linear infinite; }
      @keyframes rise { 50% { transform: translateY(-14px); } }
      @keyframes draw { to { stroke-dashoffset: -190; } }
    </style>
  </defs>
  <rect width="1100" height="760" rx="42" fill="#f7f3eb"/>
  <g filter="url(#shadow)">
    <rect x="102" y="92" width="896" height="576" rx="32" fill="#fff"/>
    <rect x="138" y="128" width="824" height="82" rx="22" fill="#18222b"/>
    <text x="176" y="180" fill="#fff" font-size="30" font-family="Arial, 'Noto Sans TC', sans-serif" font-weight="800">第一次和 AI 對話</text>
    <rect x="174" y="268" width="330" height="92" rx="24" fill="#eef3f1"/>
    <rect x="206" y="300" width="210" height="14" rx="7" fill="#0f8c8c" opacity=".6"/>
    <rect x="206" y="328" width="146" height="14" rx="7" fill="#0f8c8c" opacity=".3"/>
    <rect class="rise" x="590" y="250" width="340" height="160" rx="28" fill="#18222b"/>
    <text x="632" y="308" fill="#fff" font-size="28" font-family="Arial, 'Noto Sans TC', sans-serif" font-weight="800">角色</text>
    <rect x="632" y="334" width="214" height="15" rx="7.5" fill="#fff" opacity=".45"/>
    <rect x="632" y="366" width="170" height="15" rx="7.5" fill="#20b5ad"/>
    <rect class="rise2" x="170" y="438" width="340" height="132" rx="28" fill="#db5b48"/>
    <text x="212" y="496" fill="#fff" font-size="28" font-family="Arial, 'Noto Sans TC', sans-serif" font-weight="800">背景 + 格式</text>
    <rect x="212" y="526" width="206" height="14" rx="7" fill="#fff" opacity=".55"/>
    <path class="draw" d="M506 398 C590 382 638 438 714 434 S820 408 884 468" fill="none" stroke="#d69b2d" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
