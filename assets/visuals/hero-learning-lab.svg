<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">AI course learning lab visual</title>
  <desc id="desc">A refined abstract product-style visual showing course cards, AI dialogue, music, video, workflow and safety checks.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#e9f1ee"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1f2b36"/>
      <stop offset="1" stop-color="#0f1a22"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#20b5ad"/>
      <stop offset="1" stop-color="#0f746f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#101820" flood-opacity=".16"/>
    </filter>
    <style>
      .line { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .flow { stroke-dasharray: 10 18; animation: flow 8s linear infinite; }
      .float-a { animation: floatA 5.8s ease-in-out infinite; }
      .float-b { animation: floatB 6.4s ease-in-out infinite; }
      .float-c { animation: floatC 7s ease-in-out infinite; }
      .blink { animation: blink 2.6s ease-in-out infinite; }
      .meter { transform-origin: 760px 570px; animation: meter 4.2s ease-in-out infinite; }
      @keyframes flow { to { stroke-dashoffset: -180; } }
      @keyframes floatA { 50% { transform: translateY(-16px); } }
      @keyframes floatB { 50% { transform: translate(10px, -12px); } }
      @keyframes floatC { 50% { transform: translate(-10px, 13px); } }
      @keyframes blink { 50% { opacity: .34; } }
      @keyframes meter { 50% { transform: scaleY(.52); } }
    </style>
  </defs>

  <rect width="1400" height="900" rx="54" fill="url(#paper)"/>
  <path d="M82 730C252 600 388 680 514 540s230-270 430-166 228 20 374-94" class="line flow" stroke="#0f8c8c" stroke-width="7" opacity=".45"/>
  <path d="M82 236c164 92 300 14 446 128s210 232 410 166 260-22 382 78" class="line flow" stroke="#db5b48" stroke-width="5" opacity=".36"/>

  <g filter="url(#shadow)">
    <rect x="238" y="132" width="924" height="620" rx="34" fill="#fff"/>
    <rect x="262" y="158" width="876" height="568" rx="24" fill="#f8f7f2"/>
    <rect x="292" y="190" width="816" height="80" rx="18" fill="url(#dark)"/>
    <circle cx="330" cy="230" r="8" fill="#db5b48"/>
    <circle cx="358" cy="230" r="8" fill="#d69b2d"/>
    <circle cx="386" cy="230" r="8" fill="#3f8f5f"/>
    <text x="704" y="238" text-anchor="middle" fill="#fff" font-size="25" font-family="Arial, 'Noto Sans TC', sans-serif" font-weight="700">AI Course Studio</text>

    <g class="float-a">
      <rect x="320" y="320" width="300" height="250" rx="24" fill="#ffffff" stroke="#dfe5e2"/>
      <text x="350" y="366" fill="#18222b" font-size="30" font-family="Arial, 'Noto Sans TC', sans-serif" font-weight="800">Prompt</text>
      <rect x="350" y="404" width="214" height="17" rx="8.5" fill="#0f8c8c" opacity=".22"/>
      <rect x="350" y="438" width="190" height="17" rx="8.5" fill="#0f8c8c" opacity=".36"/>
      <rect x="350" y="472" width="232" height="17" rx="8.5" fill="#0f8c8c" opacity=".22"/>
      <rect x="350" y="518" width="118" height="36" rx="12" fill="#0f746f"/>
      <text x="409" y="542" text-anchor="middle" fill="#fff" font-size="17" font-family="Arial, 'Noto Sans TC', sans-serif" font-weight="700">問清楚</text>
    </g>

    <g>
      <rect x="674" y="318" width="168" height="250" rx="24" fill="#18222b"/>
      <rect x="694" y="344" width="128" height="198" rx="16" fill="#243447"/>
      <path d="M714 478c22-70 44-70 66 0s44 70 66 0" class="line flow" stroke="#20b5ad" stroke-width="7"/>
      <rect x="720" y="382" width="76" height="13" rx="6.5" fill="#fff" opacity=".8"/>
      <rect x="720" y="410" width="56" height="13" rx="6.5" fill="#fff" opacity=".46"/>
      <rect class="meter" x="714" y="574" width="16" height="62" rx="8" fill="#db5b48"/>
      <rect class="meter" x="746" y="552" width="16" height="84" rx="8" fill="#d69b2d"/>
      <rect class="meter" x="778" y="584" width="16" height="52" rx="8" fill="#20b5ad"/>
      <rect class="meter" x="810" y="566" width="16" height="70" rx="8" fill="#f0f4f2"/>
    </g>

    <g class="float-b">
      <rect x="884" y="316" width="196" height="252" rx="24" fill="#ffffff" stroke="#dfe5e2"/>
      <rect x="914" y="350" width="136" height="82" rx="16" fill="#edf3f1"/>
      <path d="m934 410 32-34 29 28 27-42" class="line" stroke="#0f8c8c" stroke-width="8"/>
      <text x="914" y="480" fill="#18222b" font-size="24" font-family="Arial, 'Noto Sans TC', sans-serif" font-weight="800">Video</text>
      <rect x="914" y="506" width="118" height="14" rx="7" fill="#d69b2d" opacity=".38"/>
      <rect x="914" y="532" width="92" height="14" rx="7" fill="#d69b2d" opacity=".28"/>
    </g>
  </g>

  <g class="float-c" filter="url(#shadow)">
    <rect x="142" y="566" width="278" height="126" rx="24" fill="#18222b"/>
    <text x="180" y="620" fill="#fff" font-size="30" font-family="Arial, 'Noto Sans TC', sans-serif" font-weight="800">C01-C10</text>
    <rect x="180" y="646" width="174" height="14" rx="7" fill="#20b5ad"/>
    <rect x="180" y="672" width="112" height="14" rx="7" fill="#fff" opacity=".3"/>
  </g>

  <g class="float-b" filter="url(#shadow)">
    <rect x="984" y="588" width="274" height="118" rx="24" fill="#fff"/>
    <circle cx="1034" cy="647" r="28" fill="#e3f3f0"/>
    <path d="M1022 648l9 9 17-21" class="line" stroke="#0f746f" stroke-width="7"/>
    <text x="1084" y="638" fill="#18222b" font-size="22" font-family="Arial, 'Noto Sans TC', sans-serif" font-weight="800">Human Check</text>
    <text x="1084" y="668" fill="#63707d" font-size="17" font-family="Arial, 'Noto Sans TC', sans-serif">AI 是草稿，人是最後一關</text>
  </g>

  <circle class="blink" cx="190" cy="220" r="10" fill="#db5b48"/>
  <circle class="blink" cx="1210" cy="210" r="10" fill="#d69b2d"/>
  <circle class="blink" cx="1178" cy="760" r="8" fill="#0f8c8c"/>
</svg>
