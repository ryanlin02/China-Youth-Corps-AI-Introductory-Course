<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
  <title id="title">AI media creation visual</title>
  <desc id="desc">Music and video creation panels with waveform, storyboard and motion.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#101820" flood-opacity=".16"/>
    </filter>
    <style>
      .wave { stroke-dasharray: 20 16; animation: wave 7s linear infinite; }
      .frame { animation: frame 5.4s ease-in-out infinite; }
      .frame2 { animation: frame 5.4s ease-in-out infinite; animation-delay: -1.6s; }
      @keyframes wave { to { stroke-dashoffset: -180; } }
      @keyframes frame { 50% { transform: translateY(-12px); } }
    </style>
  </defs>
  <rect width="1100" height="760" rx="42" fill="#eef3f1"/>
  <g filter="url(#shadow)">
    <rect x="118" y="104" width="392" height="552" rx="36" fill="#18222b"/>
    <text x="164" y="178" fill="#fff" font-size="32" font-family="Arial, 'Noto Sans TC', sans-serif" font-weight="800">Suno Music</text>
    <path class="wave" d="M164 354c24-94 48-94 72 0s48 94 72 0 48-94 72 0 48 94 72 0" fill="none" stroke="#20b5ad" stroke-width="12" stroke-linecap="round"/>
    <rect x="164" y="480" width="246" height="18" rx="9" fill="#fff" opacity=".36"/>
    <rect x="164" y="524" width="178" height="18" rx="9" fill="#d69b2d"/>

    <rect x="590" y="104" width="392" height="552" rx="36" fill="#fff"/>
    <text x="636" y="178" fill="#18222b" font-size="32" font-family="Arial, 'Noto Sans TC', sans-serif" font-weight="800">Story Video</text>
    <g class="frame">
      <rect x="636" y="236" width="112" height="154" rx="18" fill="#f7f3eb" stroke="#dfe5e2"/>
      <path d="m660 340 26-31 22 20 22-48" fill="none" stroke="#db5b48" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g class="frame2">
      <rect x="774" y="236" width="112" height="154" rx="18" fill="#f7f3eb" stroke="#dfe5e2"/>
      <circle cx="830" cy="306" r="32" fill="#d69b2d" opacity=".62"/>
      <path d="M804 352h52" stroke="#18222b" stroke-width="8" stroke-linecap="round"/>
    </g>
    <rect x="636" y="472" width="272" height="18" rx="9" fill="#0f8c8c" opacity=".35"/>
    <rect x="636" y="514" width="204" height="18" rx="9" fill="#0f8c8c" opacity=".58"/>
  </g>
</svg>
